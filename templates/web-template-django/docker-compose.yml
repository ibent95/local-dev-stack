# Django API. Requires the stack proxy: ./lds.sh up proxy
# First time, scaffold Django into ./src (see README).
name: web-template-django

services:
  django:
    build:
      context: .
      target: dev
    container_name: web-template-django
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${APP_HOST:-web-template-django.test}   # -> http://web-template-django.test
      VIRTUAL_PORT: "8000"
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ./src:/app
    expose:
      - "8000"
    networks: [lds-network]

networks:
  lds-network:
    external: true
