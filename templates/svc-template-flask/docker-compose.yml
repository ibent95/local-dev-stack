# Flask API. Requires the stack proxy: ./lds.sh up proxy (or ../../scripts/run/up.sh proxy)
name: svc-template-flask

services:
  flask:
    build:
      context: .
      target: dev
    container_name: svc-template-flask
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${APP_HOST:-svc-template-flask.test}   # -> http://svc-template-flask.test
      VIRTUAL_PORT: "8000"
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ./:/app
    expose:
      - "8000"
    networks: [lds-network]

networks:
  lds-network:
    external: true
