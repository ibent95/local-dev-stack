# web-template-slim — one container, supervisord runs php-fpm + nginx (global configs).
# Requires the stack proxy: ./lds.sh up proxy   (needs the lds/php base)
# Scaffold the framework into ./src first (see README).
name: web-template-slim

services:
  app:
    build:
      context: .
      target: dev
    container_name: web-template-slim
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${APP_HOST:-web-template-slim.test}   # -> http://web-template-slim.test
      VIRTUAL_PORT: "80"
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ./src:/var/www/html
    expose:
      - "80"
    networks: [lds-network]

networks:
  lds-network:
    external: true
