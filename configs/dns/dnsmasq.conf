# Resolve every *.test name to localhost (where nginx listens on :80).
address=/test/127.0.0.1

# Listen on all interfaces inside the container.
listen-address=0.0.0.0
bind-interfaces

# Don't read the container's /etc/resolv.conf; forward other queries upstream
# so normal internet DNS keeps working while your adapter points here.
no-resolv
server=8.8.8.8
server=1.1.1.1

# Helpful for debugging which names get resolved.
log-queries
