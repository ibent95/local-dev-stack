# Global default vhost for php-fpm app projects (docroot public/).
# php-fpm runs in the SAME container (supervisord), so fastcgi -> 127.0.0.1:9000.
# A project that needs a different docroot ships its own configs/nginx.conf.

# Compression — speeds up transfers by ~70% for text-based responses.
# gzip on; is already set in Debian's base nginx.conf — only add overrides.
gzip_proxied    any;
gzip_comp_level 2;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    image/svg+xml;

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
