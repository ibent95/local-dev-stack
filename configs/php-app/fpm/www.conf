[www]
; PHP-FPM Pool Configuration for Local Development
; Tune pm.max_children based on your machine's available RAM.
; Rule of thumb: each PHP worker uses ~50-80MB RAM.
; 10 workers x 80MB = ~800MB

; Run as www-data (Debian web user)
user = www-data
group = www-data

; Process Manager
pm = dynamic
; Increased for development concurrency (was 10/4/2/6)
pm.max_children = 20
pm.start_servers = 8
pm.min_spare_servers = 6
pm.max_spare_servers = 12
; Higher max_requests reduces the frequency of worker recycling. Each recycled
; worker must re-include all PHP files and rebuild class maps — with OPcache
; the compiled bytecode is shared, but worker-local state is not. 2000 ensures
; a worker lives through many requests before being respawned.
pm.max_requests = 2000
; If all spare servers are busy, new children are created on demand; this sets
; how long an idle child survives before being harvested. 10s keeps a warm
; pool ready for burst traffic without holding workers forever.
pm.process_idle_timeout = 10s

; Listen
listen = 127.0.0.1:9000

; Status page for monitoring
pm.status_path = /fpm-status
ping.path = /fpm-ping

; Logging (use /tmp which always exists in Alpine)
php_admin_value[error_log] = /tmp/php-fpm-error.log
php_admin_flag[log_errors] = on

; Timeouts
request_terminate_timeout = 120s
request_slowlog_timeout = 5s
slowlog = /tmp/php-fpm-slow.log
