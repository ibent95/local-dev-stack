# lds-kafka-broker — KRaft broker node. DHI kafka:4.3 ignores KAFKA_* env and
# reads THIS file (mounted to /opt/kafka/config/server.properties).
# INTERNAL = in-network clients (Connect, schema-registry, UI); EXTERNAL = host.
# NOTE: advertised EXTERNAL port is hardcoded 4410 (a static properties file
# can't read ${KAFKA_HOST_PORT}); keep it in sync with KAFKA_HOST_PORT in .env.
process.roles=broker
node.id=2
controller.quorum.voters=1@kafka-controller:9093
controller.listener.names=CONTROLLER
listeners=INTERNAL://:9092,EXTERNAL://:29092
advertised.listeners=INTERNAL://kafka-broker:9092,EXTERNAL://localhost:4410
listener.security.protocol.map=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
inter.broker.listener.name=INTERNAL
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0
auto.create.topics.enable=true
log.dirs=/var/lib/kafka/data
