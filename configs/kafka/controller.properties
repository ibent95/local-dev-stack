# lds-kafka-controller — KRaft controller node (static quorum).
# DHI kafka:4.3 ignores KAFKA_* env and reads THIS file (mounted to
# /opt/kafka/config/server.properties); its entrypoint auto-formats storage with
# `kafka-storage format --no-initial-controllers` (static voters from below).
process.roles=controller
node.id=1
controller.quorum.voters=1@kafka-controller:9093
listeners=CONTROLLER://:9093
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT
log.dirs=/var/lib/kafka/data
