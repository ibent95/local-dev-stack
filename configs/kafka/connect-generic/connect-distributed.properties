# =============================================================================
# Apache Kafka Connect (distributed) — generic worker.
# Same Connect runtime as the Debezium worker, but built on the vanilla
# apache/kafka image, which bundles NO connectors. Drop connector plugin JARs
# (each plugin in its own subfolder) into configs/kafka/connect-generic/plugins/
# — that host dir is mounted at the plugin.path below.
# =============================================================================
bootstrap.servers=kafka-broker:9092
group.id=connect-generic-cluster

# Plain JSON in/out — no Schema Registry dependency. Flip schemas.enable or swap
# converters per-connector as needed.
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Internal state topics — MUST differ from the Debezium worker's topics so the
# two clusters don't clobber each other's config/offsets/status.
config.storage.topic=_connect_generic_configs
offset.storage.topic=_connect_generic_offsets
status.storage.topic=_connect_generic_status
config.storage.replication.factor=1
offset.storage.replication.factor=1
status.storage.replication.factor=1
offset.flush.interval.ms=10000

# REST API (mapped to host ${CONNECT_GENERIC_HOST_PORT:-8083}).
listeners=HTTP://0.0.0.0:8083
rest.advertised.host.name=connect-generic

# Connector plugins live here (mounted from the host); empty by default.
plugin.path=/opt/kafka/connectors
