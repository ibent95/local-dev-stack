# Local-dev Eclipse Mosquitto — anonymous, MQTT + WebSocket. NOT for production.
# Mosquitto 2.x requires explicit listeners + allow_anonymous (it locks down by
# default). Bridge MQTT <-> Kafka via the generic Kafka Connect worker + the
# Stream Reactor MQTT connector (see docs/en/15-data-tools.md) — not the broker.

persistence true
persistence_location /mosquitto/data/

# Native MQTT (3.1.1 / 5.0) for backends/devices.
listener 1883
protocol mqtt

# MQTT over WebSocket — for browser clients (e.g. MQTTX Web at mqtt.test).
# Connect MQTTX to: host localhost, port 4433 (the host port mapped to 9001).
listener 9001
protocol websockets

# Dev: no auth. Lock this down (passwords/ACL) before exposing the broker anywhere.
allow_anonymous true
