# Minimal Redis config for local dev.
appendonly yes
appendfsync everysec
save 900 1
save 300 10
maxmemory-policy noeviction
# Accept connections from other containers / the host on the internal
# lds-network. Without this, Redis denies any non-loopback client ("protected
# mode … no password is set"). No auth — fine for a local dev box.
bind 0.0.0.0 -::*
protected-mode no
# Set a password instead if you prefer auth:  requirepass yourpassword
#   (then disable protected-mode line above and update app connection strings)
