# =============================================================================
# Devilbox-style mass virtual hosting.
#   - <folder>.test            -> /var/www/<folder>  (docroot auto-detected)
#   - anything else / localhost -> control-panel dashboard
# Docroot priority per project:  public/  >  htdocs/  >  folder root
# =============================================================================

# Cache file metadata (stat results) so directory existence checks from the
# if (-d) docroot detection below are much cheaper on warm requests.
open_file_cache          max=2000 inactive=30s;
open_file_cache_valid    60s;
open_file_cache_min_uses 2;
open_file_cache_errors   on;

# Optimize TCP/static file delivery
# sendfile and tcp_nopush are already set in the base nginx.conf
# (both Alpine and Debian ship with them). Only tcp_nodelay is added here.
tcp_nodelay    on;

# Reduce overhead — keep connections alive for more requests
keepalive_requests 200;
keepalive_timeout  30s;

# Compression — speeds up transfers by ~70% for text-based responses.
# gzip on; is already set in Debian's base nginx.conf — only add overrides.
# gzip_proxied is not set by default.
gzip_proxied    any;
gzip_comp_level 2;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    image/svg+xml;

# --- Control panel (default site) --------------------------------------------
# Served from /var/lds-dashboard (mounted outside /var/www), so it is NOT a
# project and has no <name>.test host of its own — reach it at http://localhost.
server {
    listen 80 default_server;
    server_name _;

    root /var/lds-dashboard;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

# --- Per-project hosting: <folder>.test --------------------------------------
server {
    listen 80;
    server_name ~^(?<sname>.+)\.test$;

    # Auto-detect docroot. Later matches win, so public/ has top priority.
    set $docroot /var/www/$sname;
    if (-d /var/www/$sname/htdocs) { set $docroot /var/www/$sname/htdocs; }
    if (-d /var/www/$sname/public) { set $docroot /var/www/$sname/public; }
    root $docroot;

    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
