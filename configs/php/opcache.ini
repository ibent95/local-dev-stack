; OPcache tuned for local development (revalidate often)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
; Revalidate every 2s instead of every request — code changes reflect within 2s
; without the per-request stat overhead.
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
; Prevent stale entries from filling up the cache over time.
; When 10% of cache is wasted (stale entries awaiting garbage collection),
; OPcache will restart validation, freeing memory for fresh scripts.
opcache.max_wasted_percentage = 10
; PHP 8.4+ reserves 64M by default for JIT buffer even when JIT is disabled.
; Set to 0 to reclaim that memory — JIT provides no benefit for I/O-bound
; web requests in local dev and only adds cold-start overhead.
opcache.jit_buffer_size = 0
