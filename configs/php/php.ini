; Local dev PHP overrides — loaded as conf.d/zz-custom.ini
date.timezone = Asia/Jakarta

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

; ---------------------------------------------------------------------------
; Realpath cache — eliminates repeated stat() calls on file operations.
; Every include/require resolves the full filesystem path; this caches the
; result. Huge impact for frameworks doing hundreds of autoload includes.
; 4096K handles ~800-1000 unique paths; ttl=120s balances freshness vs speed.
; ---------------------------------------------------------------------------
realpath_cache_size = 4096K
realpath_cache_ttl = 120

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; rdkafka / redis defaults are fine; tune here if needed.
